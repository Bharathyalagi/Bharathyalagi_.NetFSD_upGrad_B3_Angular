<h2>Contact Management</h2>

<input type="text" [(ngModel)]="searchText" placeholder="Search contacts" />

<table border="1">
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Status</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let c of contacts | search:searchText | slice:0:5">
    <td>{{ c.name | titlecase }}</td>
    <td>{{ c.email | lowercase }}</td>
    <td>{{ c.phone | phoneFormat }}</td>

    <td [style.color]="c.status ? 'green' : 'red'">
      {{ c.status | status }}
    </td>

    <td>
      <button (click)="toggleStatus(c)">Toggle</button>
    </td>
  </tr>
</table>
