<h2>Contact List</h2>

@if(contacts.length === 0) {
  <p>No Contacts Available</p>
}
@else {

<table border="1">
  <tr>
    <th>Id</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Status</th>
  </tr>

  @for (c of contacts; track c.contactId) {
    <tr 
      [ngClass]="c.isActive ? 'active-contact' : 'inactive-contact'"
      [ngStyle]="{color: c.isActive ? 'green' : 'red'}"
    >
      <td>{{c.contactId}}</td>
      <td>{{c.name}}</td>
      <td>{{c.email}}</td>
      <td>{{c.phone}}</td>

      <td>
        @if(c.isActive) {
          Active Contact
        } 
        @else {
          Inactive Contact
        }
      </td>
    </tr>
  }
</table>

}
